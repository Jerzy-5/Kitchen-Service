{% extends "base.html" %}

{% block content %}

<div style="max-width: 500px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; text-align: center;">

    <h1 style="color: red;">🗑️ Delete Dish</h1>

    <p style="margin: 20px 0;">
        Are you sure you want to delete:
        <strong>{{ object }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit"
                style="background-color: red; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">
            Yes, delete
        </button>
    </form>

    <br>

    <a href="javascript:history.back()"
       style="display: inline-block; margin-top: 10px; padding: 8px 12px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px;">
        Cancel
    </a>

</div>

{% endblock %}
